# Server Configuration
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:bXlTZWNyZXRLZXlGb3JKV1RNaW5pbXVtTGVuZ3RoSXMyNTZCaXRz}
app.jwt.expiration=86400000

# AI API Configuration
app.ai.gemini.api-key=${GEMINI_API_KEY:your-gemini-api-key-here}
app.ai.gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging
logging.level.com.Springboot.TaskFlowApplication=INFO
